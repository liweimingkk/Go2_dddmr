p2p_move_base:
  ros__parameters:
    # Match the 10 Hz local planner and XT16 obstacle stream so each decision
    # uses a fresh planning horizon and the DWA acceleration window is honest.
    controller_frequency: 10.0
    use_twist_stamped: false
    planner_patience: 10.0
    oscillation_distance: 0.05
    oscillation_angle: 0.3
    oscillation_patience: 15.0
    controller_patience: 10.0
    # Confirm across three stopped decisions (about 0.20 s from first to third)
    # before escalating. Every failed decision still publishes StopMove.
    local_failure_confirmation_cycles: 3
    no_plan_retry_num: 10
    waiting_patience: 10.0
    # Pure yaw is responsive on this Go2; the previous 0.10 m/s heading arc
    # operated in its observed low-speed dead zone and prolonged alignment.
    initial_heading_trajectory_generator: "differential_drive_rotate_shortest_angle"
    goal_heading_trajectory_generator: "differential_drive_rotate_shortest_angle"
global_plan_manager:
  ros__parameters:

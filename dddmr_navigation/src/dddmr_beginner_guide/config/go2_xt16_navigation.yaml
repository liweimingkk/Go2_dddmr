p2p_move_base:
  ros__parameters:
    # Match the 10 Hz local planner and XT16 obstacle stream so each decision
    # uses a fresh planning horizon and the DWA acceleration window is honest.
    controller_frequency: 10.0
    use_twist_stamped: false
    planner_patience: 10.0
    oscillation_distance: 0.05
    oscillation_angle: 0.3
    oscillation_patience: 15.0
    controller_patience: 10.0
    # Confirm across three stopped decisions (about 0.20 s from first to third)
    # before escalating. Every failed decision still publishes StopMove.
    local_failure_confirmation_cycles: 3
    # Normal Sport gait is retained. This navigation-layer supervisor remains
    # disabled until a site staircase model and online terrain status pass the
    # offline gates in go2_xt16_ramp_stair_test_stage_plan.md.
    terrain_supervisor_enabled: false
    terrain_status_topic: "/dddmr_terrain/status"
    terrain_supervised_status_topic: "/dddmr_terrain/supervised_status"
    terrain_status_timeout_sec: 0.30
    require_gait_monitor: true
    gait_unchanged_topic: "/dddmr_go2/gait_unchanged"
    gait_monitor_timeout_sec: 0.30
    stair_confirmation_cycles: 5
    stair_min_confidence: 0.90
    stair_min_support_ratio: 0.80
    stair_max_heading_error_rad: 0.13962634
    stair_max_lateral_error_m: 0.10
    stair_align_max_forward_mps: 0.0
    stair_align_max_yaw_rps: 0.25
    stair_committed_max_yaw_rps: 0.0
    # ALIGN uses an already collision-scored pure-yaw trajectory; the
    # supervisor never edits a scored forward trajectory into a rotation.
    stair_align_trajectory_generator: "differential_drive_stair_align"
    # Switch to differential_drive_terrain only after the complete site
    # profile is validated; the shipped flat-ground behavior stays unchanged.
    main_trajectory_generator: "differential_drive_simple"
    no_plan_retry_num: 10
    waiting_patience: 10.0
    # Pure yaw is responsive on this Go2; the previous 0.10 m/s heading arc
    # operated in its observed low-speed dead zone and prolonged alignment.
    initial_heading_trajectory_generator: "differential_drive_rotate_shortest_angle"
    goal_heading_trajectory_generator: "differential_drive_rotate_shortest_angle"
global_plan_manager:
  ros__parameters:
    global_planner_action_name: "get_dwa_plan"
    global_plan_query_frequency: 2.0

mcl_ip:
  ros__parameters:
    laser:
        odom_type: "wheel_odometry"         # wheel_odometry/laser_odometry
        base_ground_frame: "base_link"
        num_vertical_scans: 16
        # Current XT16 driver mode publishes 2000 samples/ring (32000 points)
        # at 10 Hz. Match the range-image columns so adjacent samples remain
        # adjacent during segmentation.
        num_horizontal_scans: 2000
        vertical_angle_bottom: -15.0        # degrees
        vertical_angle_top: 15.0            # degrees
        scan_period: 0.1                    # seconds


    imageProjection:
        segment_valid_point_num: 5
        segment_valid_line_num: 3
        segment_theta: 60.0                 # decrease this value may improve accuracy
        minimum_detection_range: 0.5
        maximum_detection_range: 100.0
        distance_for_patch_between_rings: 1.0
        stitcher_num: 0
        trt_model_path: ""
        projected_image_stack_size: 1
        ground_slope_tolerance: 0.3
        ground_dz_tolerance: 0.1
        patch_first_ring_to_baselink: true

        ground_fov_bottom: -0.2617994       # -15deg
        ground_fov_top: -0.087266           # -5deg
        ground_positive_start: 0.0
        ground_positive_stop: 3.1415926
        ground_negative_start: 0.0
        ground_negative_stop: -3.1415926
mcl_fa:
  ros__parameters:
    featureAssociation:
        edge_threshold: 0.1
        surf_threshold: 0.1
        nearest_feature_search_distance: 3.0
    mapping:
        to_map_optimization: false

dddmr_pg_map_server_manager:
  ros__parameters:
    maps: ["map1"]

map1:
  ros__parameters:
    pose_graph_dir: "/root/dddmr_bags/go2_xt16_mouth_mapping_20260710_153813_map_2026_07_10_07_38_12"
    # Fill with the measured site profile's 64-hex source map hash before
    # enabling terrain ROI/layers. Empty keeps terrain fail-closed.
    source_map_sha256: ""
    complete_map_voxel_size: 0.2
    complete_ground_voxel_size: 0.2
    # Keep the localization map at 0.2 m. Enable a separate high-resolution
    # terrain ROI only after the bounds are surveyed for the test staircase.
    terrain_roi_enabled: false
    terrain_roi_voxel_size: 0.05
    terrain_roi_min_x: 0.0
    terrain_roi_min_y: 0.0
    terrain_roi_min_z: 0.0
    terrain_roi_max_x: 0.0
    terrain_roi_max_y: 0.0
    terrain_roi_max_z: 0.0

sub_maps:
  ros__parameters:
    pg_map_server_name: "map1" #options from line#56
    sub_map_search_radius: 50.0
    sub_map_warmup_trigger_distance: 20.0


local_planner:
  ros__parameters:
    odom_topic: "/dddmr_go2/robot_odom_standard"
    forward_prune: 3.0
    backward_prune: 1.0
    heading_tracking_distance: 0.5
    heading_align_angle: 0.8
    prune_plane_timeout: 3.0
    plan_max_segment_length: 0.75
    # Keep horizontal and elevation acceptance independent. A wide 3D radius
    # can otherwise report success on the wrong landing or floor.
    xy_goal_tolerance: 0.4
    z_goal_tolerance: 0.2
    yaw_goal_tolerance: 0.8
    # Global-plan z is mapground; base_link is nominally 0.24 m above it.
    robot_ground_z_offset: 0.24
    # Enable together with a validated TerrainLayer.  It prevents a goal on a
    # vertically overlapping floor, the opposite landing, or another tread
    # from being accepted merely because the XYZ tolerance happens to pass.
    goal_surface_match_required: false
    goal_terrain_search_radius: 0.35
    controller_frequency: 10.0
    debug_rejection_report: true
    # Hold a collision-accepted in-place turn direction across control cycles.
    # This prevents nearly symmetric left/right candidates from alternating and
    # making the robot shake in front of an obstacle.
    in_place_direction_hysteresis_enabled: true
    in_place_direction_hysteresis_generator: "differential_drive_simple"
    # Ignore small critic noise; after a three-second hold, allow only a
    # materially better side to win so the lock cannot force a long detour.
    in_place_direction_min_hold_sec: 3.0
    in_place_direction_switch_cost_margin: 0.20
    in_place_direction_reset_gap_sec: 2.0
    # Preserve the chosen side until it is genuinely unavailable. A transient
    # one-frame loss stops safely instead of immediately reversing direction.
    in_place_direction_allow_cost_switch: true
    in_place_direction_unavailable_grace_sec: 0.10
    
    # Swept Go2 stance envelope. base_footprint is 0.24 m below base_link;
    # leave 0.04 m ground tolerance while protecting the legs and lower body.
    cuboid:
      flb: [0.42, 0.30, -0.20] #front left bottom
      frb: [0.42, -0.30, -0.20]
      flt: [0.42, 0.30, 0.60] #front left top
      frt: [0.42, -0.30, 0.60]
      blb: [-0.35, 0.30, -0.20] #back left bottom
      brb: [-0.35, -0.30, -0.20]
      blt: [-0.35, 0.30, 0.60]
      brt: [-0.35, -0.30, 0.60]

recovery_behaviors:
  ros__parameters:
    plugins: ["rotate_inplace"]
    rotate_inplace:
      plugin: "recovery_behaviors::RotateInPlaceBehavior"
      frequency: 10.0
      tolerance: 0.3
      transform_timeout: 2.0
      odom_timeout: 0.5
      future_tolerance: 0.1
      progress_timeout: 3.0
      progress_angle: 0.05
      trajectory_generator_name: "differential_drive_rotate_inplace"

trajectory_generators:
  ros__parameters:
    plugins: ["differential_drive_simple", "differential_drive_terrain", "differential_drive_stair_align", "differential_drive_rotate_inplace", "differential_drive_rotate_shortest_angle", "differential_drive_go2_heading_arc"]
    differential_drive_rotate_shortest_angle:
      plugin: "trajectory_generators::DDRotateInplaceTheory"
      controller_frequency: 10.0
      rotation_speed: 0.40
      rotation_forward_x: 0.0
      sim_time: 2.0
      # Heading alignment is re-evaluated every control cycle. Check the next
      # 2 s / 0.8 rad, not an unnecessarily conservative full 360-degree sweep.
      simulate_full_rotation_for_pure_yaw: false
      cuboid:
        flb: [0.42, 0.30, -0.20] #front left bottom
        frb: [0.42, -0.30, -0.20]
        flt: [0.42, 0.30, 0.60] #front left top
        frt: [0.42, -0.30, 0.60]
        blb: [-0.35, 0.30, -0.20] #back left bottom
        brb: [-0.35, -0.30, -0.20]
        blt: [-0.35, 0.30, 0.60]
        brt: [-0.35, -0.30, 0.60]

    differential_drive_rotate_inplace:
      plugin: "trajectory_generators::DDRotateInplaceTheory"
      controller_frequency: 10.0
      rotation_speed: 0.50
      rotation_forward_x: 0.0
      cuboid:
        flb: [0.42, 0.30, -0.20] #front left bottom
        frb: [0.42, -0.30, -0.20]
        flt: [0.42, 0.30, 0.60] #front left top
        frt: [0.42, -0.30, 0.60]
        blb: [-0.35, 0.30, -0.20] #back left bottom
        brb: [-0.35, -0.30, -0.20]
        blt: [-0.35, 0.30, 0.60]
        brt: [-0.35, -0.30, 0.60]

    # Platform-only alignment for the stair supervisor. The command is
    # collision-scored as generated and is never reshaped afterward. Its
    # 0.20 rad/s value remains subject to the site capability evidence.
    differential_drive_stair_align:
      plugin: "trajectory_generators::DDRotateInplaceTheory"
      controller_frequency: 10.0
      rotation_speed: 0.20
      rotation_forward_x: 0.0
      sim_time: 1.0
      simulate_full_rotation_for_pure_yaw: false
      cuboid:
        flb: [0.42, 0.30, -0.20]
        frb: [0.42, -0.30, -0.20]
        flt: [0.42, 0.30, 0.60]
        frt: [0.42, -0.30, 0.60]
        blb: [-0.35, 0.30, -0.20]
        brb: [-0.35, -0.30, -0.20]
        blt: [-0.35, 0.30, 0.60]
        brt: [-0.35, -0.30, 0.60]

    differential_drive_go2_heading_arc:
      plugin: "trajectory_generators::DDRotateInplaceTheory"
      controller_frequency: 10.0
      rotation_speed: 0.50
      rotation_forward_x: 0.10
      sim_time: 0.8
      linear_x_sample: 1.0
      angular_z_sample: 2.0
      cuboid:
        flb: [0.42, 0.30, -0.20] #front left bottom
        frb: [0.42, -0.30, -0.20]
        flt: [0.42, 0.30, 0.60] #front left top
        frt: [0.42, -0.30, 0.60]
        blb: [-0.35, 0.30, -0.20] #back left bottom
        brb: [-0.35, -0.30, -0.20]
        blt: [-0.35, 0.30, 0.60]
        brt: [-0.35, -0.30, 0.60]
    
    differential_drive_simple:
      plugin: "trajectory_generators::DDSimpleTrajectoryGeneratorTheory"
      # Field replay showed that 0.10-0.15 m/s forward and about 0.05 rad/s
      # in-place Move requests leave the Go2 effectively stationary. Sample
      # only executable motion after odometry confirms a full stop.
      max_vel_x: 0.40
      min_vel_x: 0.30
      max_vel_theta: 0.50
      min_vel_theta: 0.40
      enable_in_place_rotation: true
      in_place_rotation_max_linear_speed: 0.05
      # Treat only the measured near-zero yaw noise as stopped. Real rotation
      # rates (0.108/0.212 rad/s in the trace) remain dynamically constrained.
      in_place_rotation_stopped_angular_speed: 0.02
      acc_lim_x: 3.00
      # At 10 Hz this makes +/-0.40 rad/s reachable from rest, matching
      # min_vel_theta instead of silently filtering every rotation sample.
      acc_lim_theta: 4.0
      deceleration_ratio: 2.0
      max_motor_shaft_rpm: 3000.0
      wheel_diameter: 0.16
      gear_ratio: 1.0
      robot_radius: 0.25
      
      controller_frequency: 10.0
      sim_time: 1.5
      linear_x_sample: 5.0
      angular_z_sample: 10.0
      sim_granularity: 0.05
      angular_sim_granularity: 0.025

      cuboid:
        flb: [0.42, 0.30, -0.20] #front left bottom
        frb: [0.42, -0.30, -0.20]
        flt: [0.42, 0.30, 0.60] #front left top
        frt: [0.42, -0.30, 0.60]
        blb: [-0.35, 0.30, -0.20] #back left bottom
        brb: [-0.35, -0.30, -0.20]
        blt: [-0.35, 0.30, 0.60]
        brt: [-0.35, -0.30, 0.60]

    # Loaded under a distinct name so flat navigation remains an exact legacy
    # path. It produces no candidates while terrain_enabled is false.
    differential_drive_terrain:
      plugin: "trajectory_generators::TerrainFollowingDDTheory"
      terrain_enabled: false
      terrain_fail_closed: true
      terrain_body_clearance_m: 0.24
      terrain_max_support_xy_distance_m: 0.15
      terrain_max_support_vertical_distance_m: 0.30
      terrain_min_support_ratio: 0.80
      terrain_min_confidence: 0.90
      terrain_min_upward_normal_z: 0.20
      terrain_max_normal_change_rad: 0.35
      terrain_stair_transition_waypoint_tolerance_m: 0.15
      terrain_max_stair_transition_span_m: 0.45
      terrain_max_stair_heading_error_rad: 0.0
      terrain_stairs_enabled: false
      terrain_require_manual_corridor: true
      terrain_require_online_confirmation: true
      max_vel_x: 0.40
      min_vel_x: 0.30
      max_vel_theta: 0.50
      min_vel_theta: 0.40
      enable_in_place_rotation: false
      in_place_rotation_max_linear_speed: 0.0
      in_place_rotation_stopped_angular_speed: 0.02
      acc_lim_x: 3.00
      acc_lim_theta: 4.0
      deceleration_ratio: 2.0
      max_motor_shaft_rpm: 3000.0
      wheel_diameter: 0.16
      gear_ratio: 1.0
      robot_radius: 0.25
      controller_frequency: 10.0
      sim_time: 1.5
      linear_x_sample: 5.0
      angular_z_sample: 10.0
      sim_granularity: 0.05
      angular_sim_granularity: 0.025
      cuboid:
        flb: [0.42, 0.30, -0.20]
        frb: [0.42, -0.30, -0.20]
        flt: [0.42, 0.30, 0.60]
        frt: [0.42, -0.30, 0.60]
        blb: [-0.35, 0.30, -0.20]
        brb: [-0.35, -0.30, -0.20]
        blt: [-0.35, 0.30, 0.60]
        brt: [-0.35, -0.30, 0.60]

mpc_critics:
  ros__parameters:
    plugins: ["collision", "stick_path", "pure_pursuit", "toward_global_plan", "terrain_collision", "terrain_stick_path", "terrain_pure_pursuit", "terrain_toward_global_plan", "terrain_support", "collision_stair_align", "prefer_stair_align", "collision_rotate", "collision_rotate_shortest", "prefer_rotate_shortest", "collision_go2_heading_arc", "prefer_go2_heading_arc"]
    collision:
      plugin: "mpc_critics::CollisionModel"
      trajectory_generator: differential_drive_simple
      weight: 1.0
    stick_path:
      plugin: "mpc_critics::StickPathModel"
      trajectory_generator: differential_drive_simple
      weight: 0.1
    pure_pursuit:
      plugin: "mpc_critics::PurePursuitModel"
      trajectory_generator: differential_drive_simple
      translation_weight: 1.0
      orientation_weight: 0.01
    toward_global_plan:
      plugin: "mpc_critics::TowardGlobalPlanModel"
      trajectory_generator: differential_drive_simple
      weight: 1.0
    terrain_collision:
      plugin: "mpc_critics::CollisionModel"
      trajectory_generator: differential_drive_terrain
      weight: 1.0
      # Only a surveyed, online-confirmed expected riser may enter the leg
      # envelope. Every zero below is literal zero capability while disabled.
      stair_semantics:
        enabled: false
        fail_closed: true
        expected_map_hash: ""
        max_snapshot_age_sec: 0.0
        minimum_stair_confidence: 0.0
        max_node_match_distance_m: 0.0
        riser_plane_tolerance_m: 0.0
        riser_lateral_tolerance_m: 0.0
        riser_vertical_tolerance_m: 0.0
        leg_envelope_min_x_m: 0.0
        leg_envelope_min_y_m: 0.0
        leg_envelope_min_z_m: 0.0
        leg_envelope_max_x_m: 0.0
        leg_envelope_max_y_m: 0.0
        leg_envelope_max_z_m: 0.0
        max_support_xy_distance_m: 0.0
        min_body_clearance_m: 0.0
        max_body_clearance_m: 0.0
    terrain_stick_path:
      plugin: "mpc_critics::StickPathModel"
      trajectory_generator: differential_drive_terrain
      weight: 0.1
    terrain_pure_pursuit:
      plugin: "mpc_critics::PurePursuitModel"
      trajectory_generator: differential_drive_terrain
      translation_weight: 1.0
      orientation_weight: 0.01
    terrain_toward_global_plan:
      plugin: "mpc_critics::TowardGlobalPlanModel"
      trajectory_generator: differential_drive_terrain
      weight: 1.0
    # Loaded but disabled until the surveyed ROI/stair model passes offline
    # validation. Enabling it is fail-closed and never changes the Go2 gait.
    terrain_support:
      plugin: "mpc_critics::TerrainSupportModel"
      trajectory_generator: differential_drive_terrain
      enabled: false
      fail_closed: true
      weight: 1.0
      support_z_offset_m: 0.24
      max_support_distance_m: 0.30
      max_z_gap_m: 0.12
      min_support_ratio: 0.80
      min_confidence: 0.90
      max_step_index_delta: 1
      stairs_enabled: false
      require_manual_corridor: true
      require_online_confirmation: true
    collision_stair_align:
      plugin: "mpc_critics::CollisionModel"
      trajectory_generator: differential_drive_stair_align
      weight: 1.0
    prefer_stair_align:
      plugin: "mpc_critics::ShortestAngleModel"
      trajectory_generator: differential_drive_stair_align
      weight: 1.0
    collision_rotate:
      plugin: "mpc_critics::CollisionModel"
      trajectory_generator: differential_drive_rotate_inplace
      weight: 1.0
    collision_rotate_shortest:
      plugin: "mpc_critics::CollisionModel"
      trajectory_generator: differential_drive_rotate_shortest_angle
      weight: 1.0    
    prefer_rotate_shortest:
      plugin: "mpc_critics::ShortestAngleModel"
      trajectory_generator: differential_drive_rotate_shortest_angle
      weight: 1.0
    collision_go2_heading_arc:
      plugin: "mpc_critics::CollisionModel"
      trajectory_generator: differential_drive_go2_heading_arc
      weight: 1.0
    prefer_go2_heading_arc:
      plugin: "mpc_critics::ShortestAngleModel"
      trajectory_generator: differential_drive_go2_heading_arc
      weight: 1.0

perception_3d_local:
  ros__parameters:
    global_frame: "map"
    robot_base_frame: "base_link"
    max_obstacle_distance: 9999.0
    # Centerline hard clearance. A 0.40 m radius requires roughly 0.8 m of
    # usable passage width before localization and tracking tolerances.
    inscribed_radius: 0.40
    inflation_descending_rate: 2.0
    inflation_radius: 1.5
    sensors_collected_frequency: 10.0
    plugins: ["map", "path_blocked_strategy", "lidar", "terrain"]
    map:
      plugin: "perception_3d::StaticLayer"
      is_local_planner: true
      mapping_mode: false
      map_topic: "map1/mapcloud"
      # navigation_ground equals mapground while terrain ROI is disabled; when
      # enabled it substitutes only the surveyed ROI with high-resolution data.
      ground_topic: "map1/navigation_ground"
    path_blocked_strategy:
      plugin: "perception_3d::PathBlockedStrategy"
      check_radius: 0.40
    lidar:
      plugin: "perception_3d::MultiLayerSpinningLidar"
      is_local_planner: true
      topic: "segmented_cloud_pure"
      pub_gbl_marking_for_visualization: false
      vertical_FOV_top: 15.0
      vertical_FOV_bottom: -15.0
      scan_effective_positive_start: 30.0
      scan_effective_positive_end: 180.0
      scan_effective_negative_start: -30.0
      scan_effective_negative_end: -180.0
      xy_resolution: 0.05
      height_resolution: 0.05
      # segmented_cloud_pure is already non-ground. Include the lower body and
      # leg envelope instead of discarding everything below base_link + 5 cm.
      marking_minimum_height: -0.20
      marking_height: 0.60
      perception_window_size: 3.0 #the window for marking/clearing in meter, we dont casting to maximum range of the sensor even it is gbl map
      segmentation_ignore_ratio: 0.5 #f a segmentation match static pc with this ratio, we ignore it. ex: a wall
      expected_sensor_time: 0.2
      # Expected-riser marking is opt-in and uses the same immutable terrain
      # identity as planning. Unknown, dynamic, side-wall and cross-floor
      # points remain obstacles.
      stair_riser_marking:
        enabled: false
        fail_closed: true
        expected_map_hash: ""
        max_snapshot_age_sec: 0.0
        minimum_stair_confidence: 0.0
        max_node_match_distance_m: 0.0
        riser_plane_tolerance_m: 0.0
        riser_lateral_tolerance_m: 0.0
        riser_vertical_tolerance_m: 0.0
        surface_plane_tolerance_m: 0.0
    terrain:
      plugin: "perception_3d::TerrainLayer"
      enabled: false
      is_local_planner: true
      publish_status: true
      require_live_ground: true
      require_live_obstacle_for_stairs: true
      publish_debug_clouds: true
      map_hash: ""
      map_identity_topic: "map1/map_sha256"
      terrain_ground_topic: "map1/terrain_ground"
      live_ground_topic: "ground_cloud"
      live_obstacle_topic: "segmented_cloud_pure"
      max_age_sec: 0.20
      robot_ground_z_offset_m: 0.24
      rebuild_period_sec: 0.10
      status_min_confidence: 0.90
      status_min_support_ratio: 0.80
      stair_ids: []

perception_3d_global:
  ros__parameters:
    global_frame: "map"
    robot_base_frame: "base_link"
    max_obstacle_distance: 9999.0
    # Match the local centerline clearance; static walls retain measured
    # horizontal distance and the local planner checks the oriented cuboid.
    inscribed_radius: 0.40
    inflation_descending_rate: 2.0
    inflation_radius: 1.5
    sensors_collected_frequency: 10.0
    plugins: ["map", "lidar", "terrain"]
    dgraph_publish_frequency: 1.0
    map:
      plugin: "perception_3d::StaticLayer"
      is_local_planner: false
      use_adaptive_connection: false #If true: the neighbors of node is sparse, it will automatically increase search radius.
      adaptive_connection_number: 20
      radius_of_ground_connection: 1.5 #If use_adaptive_connection=false, the radius search of the node is applied.
      intensity_search_radius: 3.0 #this value is suggested to be 1.0 meters, because if it is too large, the narrow passage will be miscalculated
      intensity_search_punish_weight: 0.1 #the weight for a node. Set this value higher means we dont like path planning cross a orphan node.
      static_imposing_radius: 1.5 #use map to add weight on each ground node
      static_obstacle_min_points: 11
      static_obstacle_xy_radius: 0.40
      map_topic: "map1/mapcloud"
      ground_topic: "map1/navigation_ground"
      support:
        mapping_mode: false
          #if mapping mode is true, edge detection is automatically disabled
        enable_edge_detection: true
        generate_static_graph: false
          #the connection radius will be used
          #enable this value when using super dense ground say ground voxel size<=10 cm

    lidar:
      plugin: "perception_3d::MultiLayerSpinningLidar"
      is_local_planner: false
      topic: "segmented_cloud_pure"
      pub_gbl_marking_for_visualization: true
      vertical_FOV_top: 15.0
      vertical_FOV_bottom: -15.0
      scan_effective_positive_start: 30.0
      scan_effective_positive_end: 180.0
      scan_effective_negative_start: -30.0
      scan_effective_negative_end: -180.0
      euclidean_cluster_extraction_tolerance: 0.1
      euclidean_cluster_extraction_min_cluster_size: 1
      xy_resolution: 0.05
      height_resolution: 0.05
      marking_height: 2.0
      perception_window_size: 5.0 #the window for marking/clearing in meter, we dont casting to maximum range of the sensor even it is gbl map
      segmentation_ignore_ratio: 1.1 #f a segmentation match static pc with this ratio, we ignore it. ex: a wall
      expected_sensor_time: 0.1
      stair_riser_marking:
        enabled: false
        fail_closed: true
        expected_map_hash: ""
        max_snapshot_age_sec: 0.0
        minimum_stair_confidence: 0.0
        max_node_match_distance_m: 0.0
        riser_plane_tolerance_m: 0.0
        riser_lateral_tolerance_m: 0.0
        riser_vertical_tolerance_m: 0.0
        surface_plane_tolerance_m: 0.0
    terrain:
      plugin: "perception_3d::TerrainLayer"
      enabled: false
      is_local_planner: false
      publish_status: false
      require_live_ground: true
      require_live_obstacle_for_stairs: true
      publish_debug_clouds: false
      map_hash: ""
      map_identity_topic: "map1/map_sha256"
      terrain_ground_topic: "map1/terrain_ground"
      live_ground_topic: "ground_cloud"
      live_obstacle_topic: "segmented_cloud_pure"
      max_age_sec: 0.20
      robot_ground_z_offset_m: 0.24
      rebuild_period_sec: 0.10
      status_min_confidence: 0.90
      status_min_support_ratio: 0.80
      stair_ids: []

global_planner:
  ros__parameters:
    turning_weight: 0.1 #Punish the zig-zag path
    enable_detail_log: false
    robot_ground_z_offset: 0.24
    # Terrain planning is an explicit, fail-closed capability.  All physical
    # envelopes remain zero until copied from a validated site profile.
    terrain:
      enabled: false
      fail_closed: true
      map_hash: ""
      required_snapshot_version: 0
      support_sample_spacing_m: 0.05
      support_search_radius_m: 0.10
      support_vertical_tolerance_m: 0.10
      continuous_height_residual_m: 0.04
      ground_index_alignment_tolerance_m: 0.01
      max_up_slope_rad: 0.0
      max_down_slope_rad: 0.0
      max_cross_slope_rad: 0.0
      max_roughness_m: 0.0
      max_normal_change_rad: 0.0
      max_step_up_m: 0.0
      max_step_down_m: 0.0
      min_support_ratio: 0.80
      max_unknown_ratio: 0.0
      min_confidence: 0.90
      max_support_sample_spacing_m: 0.05
      stair_enabled: false
      allow_stair_up: false
      allow_stair_down: false
      require_manual_corridor: true
      require_online_confirmation: true
      max_step_index_delta: 1
      max_stair_riser_height_m: 0.0
      min_stair_tread_depth_m: 0.0
      max_stair_tread_depth_m: 0.0
      max_stair_riser_deviation_m: 0.0
      max_stair_tread_deviation_m: 0.0
      max_stair_heading_error_rad: 0.0
      distance_cost_weight: 1.0
      slope_cost_weight: 1.0
      cross_slope_cost_weight: 1.0
      roughness_cost_weight: 1.0
      risk_cost_weight: 1.0
      stair_transition_cost: 0.0

#if we use get_dwa_plan in global_plan_manager, we setup parameters for dwa_global_planner
dynamic_window_aware_global_planner:
  ros__parameters:
    look_ahead_distance: 2.0
    recompute_frequency: 10.0
    # Ordinary gaps still use the existing splice limit. Only a uniquely
    # mapped, snapshot-bound adjacent stair transition may exceed it.
    terrain_transition_mapping_tolerance: 0.001
    

lego_loam_ip:
  ros__parameters:
    use_sim_time: false
    # Hesai XT16: derived from upstream loam_c16_config.yaml per issue #58.
    # The live Go2 SDK odom frame uses a raw body convention where physical
    # forward appears as -Y. lego_loam_go2_xt16_live.launch standardizes that
    # raw odom first, then feeds /dddmr_go2/robot_odom_standard to LeGO-LOAM.
    # Standard ROS body convention in this config:
    #   base_link +X = physical forward, +Y = left, +Z = up
    # Live Go2 XT16 TF published by the launch when publish_static_tf:=true.
    # The XT16 mount translation follows the provided extrinsic note. The Hesai
    # driver cloud axes observed in RViz put physical forward on -Y, so the
    # point cloud frame gets +90deg yaw to expose physical forward as base_link +X.
    #   base_link -> go2_imu:      -0.02557 0.0 0.04232 0.0 0.0 0.0
    #   go2_imu  -> hesai_lidar:   0.1710 0.0 0.0908 0.0 0.0 +1.5707963
    # XT16 drawing/extrinsic note: relative rotation is identity; translation is
    # (0.1710, 0.0, 0.0908) in the Go2 internal IMU frame.
    # Unitree Go2 URDF uses base -> imu at the same offset; here base_link is the
    # standardized ROS frame matching the official URDF base axis convention.
    # External odometry flow:
    #   /utlidar/robot_odom -> go2_odom_standardizer
    #   -> /dddmr_go2/robot_odom_standard -> lego_loam internal /odom
    laser:
        odom_type: "wheel_odometry"         # wheel_odometry/laser_odometry
        base_ground_frame: "base_link"
        num_vertical_scans: 16
        num_horizontal_scans: 4000
        vertical_angle_bottom: -15.0        # degrees
        vertical_angle_top: 15.0            # degrees
        scan_period: 0.1                    # seconds

    imageProjection:
        segment_valid_point_num: 5
        segment_valid_line_num: 3
        segment_theta: 60.0                 # decrease this value may improve accuracy
        minimum_detection_range: 0.5
        maximum_detection_range: 100.0
        distance_for_patch_between_rings: 1.0
        stitcher_num: 0
        trt_model_path: ""
        projected_image_stack_size: 1
        ground_slope_tolerance: 0.3
        ground_dz_tolerance: 0.1
        patch_first_ring_to_baselink: true
        # Disable only for this live Go2 XT16 path because OMP voxel filtering
        # has shown live crash risk in this workspace. Other configs keep the
        # upstream-compatible default true.
        use_omp_ground_voxel_filter: false

        ground_fov_bottom: -0.2617994       # -15deg
        ground_fov_top: -0.087266           # -5deg
        ground_positive_start: 0.0
        ground_positive_stop: 3.1415926
        ground_negative_start: 0.0
        ground_negative_stop: -3.1415926

lego_loam_fa:
  ros__parameters:
    use_sim_time: false
    featureAssociation:                              
        edge_threshold: 0.1
        surf_threshold: 0.1
        nearest_feature_search_distance: 5.0

    mapping:
        to_map_optimization: true

lego_loam_mo:
  ros__parameters:
    use_sim_time: false

    mapping:

        distance_between_key_frame: 0.5
        angle_between_key_frame: 0.5

        # Keep loop closure off for the first live Go2 Docker mapping pass.
        # Issue #58 reports allocator/thread-like crashes around map optimization;
        # first prove stable local mapping before enabling loop closure.
        enable_loop_closure: false

        surrounding_keyframe_search_num: 50
        history_keyframe_search_radius: 12.0
        history_keyframe_search_num: 5
        history_keyframe_fitness_score: 0.5
        
        ground_voxel_size: 0.3
        # Publish odom -> base_link from standardized odom so RViz can resolve
        # map -> odom -> base_link -> go2_imu -> hesai_lidar.
        broadcast_external_odom_tf: true

lego_loam_map_visualization:
  ros__parameters:
    use_sim_time: false
    ground_voxel_size: 0.3
    ground_edge_threshold_num: 50

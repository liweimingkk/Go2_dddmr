bag_reader:
  ros__parameters:
    use_sim_time: false
    bag_file_dir: "/root/dddmr_bags/go2_xt16_dddmr_mapping_20260704_081247"
    point_cloud_topic: "/lidar_points"
    odometry_topic: "/utlidar/robot_odom"
    skip_frame: 2

lego_loam_ip:
  ros__parameters:
    use_sim_time: false
    laser:
        odom_type: "wheel_odometry"
        base_ground_frame: "base_link"
        num_vertical_scans: 16
        num_horizontal_scans: 4000
        vertical_angle_bottom: -15.0
        vertical_angle_top: 15.0
        scan_period: 0.1

    imageProjection:
        segment_valid_point_num: 5
        segment_valid_line_num: 3
        segment_theta: 60.0
        minimum_detection_range: 0.5
        maximum_detection_range: 100.0
        distance_for_patch_between_rings: 1.0
        stitcher_num: 0
        trt_model_path: ""
        projected_image_stack_size: 1
        ground_slope_tolerance: 0.3
        ground_dz_tolerance: 0.1
        patch_first_ring_to_baselink: true
        use_omp_ground_voxel_filter: false

        ground_fov_bottom: -0.2617994
        ground_fov_top: -0.087266
        ground_positive_start: 0.0
        ground_positive_stop: 3.1415926
        ground_negative_start: 0.0
        ground_negative_stop: -3.1415926

lego_loam_fa:
  ros__parameters:
    use_sim_time: false
    featureAssociation:
        edge_threshold: 0.1
        surf_threshold: 0.1
        nearest_feature_search_distance: 5.0

    mapping:
        to_map_optimization: true

lego_loam_mo:
  ros__parameters:
    use_sim_time: false

    mapping:
        distance_between_key_frame: 0.5
        angle_between_key_frame: 0.5
        enable_loop_closure: false
        surrounding_keyframe_search_num: 50
        history_keyframe_search_radius: 12.0
        history_keyframe_search_num: 5
        history_keyframe_fitness_score: 0.5
        ground_voxel_size: 0.3
        broadcast_external_odom_tf: true

lego_loam_map_visualization:
  ros__parameters:
    use_sim_time: false
    ground_voxel_size: 0.3
    ground_edge_threshold_num: 50

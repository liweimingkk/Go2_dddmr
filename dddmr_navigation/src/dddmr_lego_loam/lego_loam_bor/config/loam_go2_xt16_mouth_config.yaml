lego_loam_ip:
  ros__parameters:
    use_sim_time: false
    # Derived from loam_go2_xt16_live.yaml. Keep the XT16 scan parameters
    # matched to the active 32000-point, 10 Hz driver mode.
    laser:
        odom_type: "wheel_odometry"
        base_ground_frame: "base_link"
        num_vertical_scans: 16
        num_horizontal_scans: 2000
        vertical_angle_bottom: -15.0
        vertical_angle_top: 15.0
        scan_period: 0.1

    imageProjection:
        segment_valid_point_num: 5
        segment_valid_line_num: 3
        segment_theta: 60.0
        minimum_detection_range: 0.5
        maximum_detection_range: 100.0
        distance_for_patch_between_rings: 1.0
        stitcher_num: 0
        trt_model_path: ""
        projected_image_stack_size: 1
        ground_slope_tolerance: 0.3
        ground_dz_tolerance: 0.1
        patch_first_ring_to_baselink: true
        # Disable only for this live Go2 XT16 path because OMP voxel filtering
        # has shown live crash risk in this workspace. Other configs keep the
        # upstream-compatible default true.
        use_omp_ground_voxel_filter: false

        ground_fov_bottom: -0.2617994
        ground_fov_top: -0.087266
        ground_positive_start: 0.0
        ground_positive_stop: 3.1415926
        ground_negative_start: 0.0
        ground_negative_stop: -3.1415926

        enable_mouth_ground_fusion: true
        # Use local planar geometry plus a support-connected search. This lets
        # successive treads enter the existing mapground without encoding the
        # temporary test stair's height. fixed_z remains available as a
        # stationary troubleshooting fallback.
        mouth_ground_mode: "connected_surface"
        # Current validated Go2 topic. Raw /utlidar/cloud has frame
        # utlidar_lidar in this live graph and must not be treated as validated
        # until a correct utlidar_lidar TF is provided and checked.
        mouth_cloud_topic: "/utlidar/cloud_base"
        # /utlidar/cloud_base already publishes frame_id=base_link. Keep empty
        # by default so future frame mistakes are visible instead of masked.
        mouth_frame_override: ""
        # The Go2 body controller keeps base_link approximately gravity
        # aligned. The 35 degree surface envelope below tolerates normal body
        # attitude changes while still rejecting stair risers.
        mouth_filter_frame: "base_link"
        # Clouds are not motion-compensated across timestamps. Keep this close
        # to the measured pairing window so walking motion is not written into
        # the map as a spatial offset.
        mouth_max_time_diff: 0.03
        # Add a positive offset only after confirming the live mouth cloud
        # header lag is stable. Values above 0.03 are stationary geometry
        # smoke-test overrides until cross-timestamp motion compensation exists.
        mouth_time_offset_sec: 0.0
        # Used only when mouth_ground_mode=fixed_z.
        mouth_ground_z_min: -0.42
        mouth_ground_z_max: -0.18
        mouth_x_min: 0.05
        mouth_x_max: 3.0
        mouth_y_abs: 1.2
        mouth_range_min: 0.15
        mouth_range_max: 4.5
        mouth_voxel_size: 0.03
        mouth_mapping_obstacle_voxel_size: 0.10
        mouth_buffer_size: 90
        mouth_min_points: 20
        mouth_normal_radius: 0.18
        mouth_min_normal_neighbors: 6
        mouth_max_support_slope: 0.6108652382  # 35 degrees
        mouth_min_obstacle_slope: 0.9599310886  # 55 degrees; 35-55 degrees remains unknown
        mouth_max_planarity_residual: 0.035
        mouth_min_planar_spread: 0.020
        # This broad band describes the current foot-support surface relative
        # to base_link. It anchors the connected search but does not limit the
        # height of later treads.
        mouth_support_seed_z_min: -0.50
        mouth_support_seed_z_max: -0.18
        mouth_support_seed_x_max: 0.70
        mouth_support_seed_y_abs: 0.55
        mouth_support_reference_radius: 0.12
        # Robot capability/sampling envelope, not a measured stair constant.
        mouth_support_connection_radius: 0.34
        mouth_maximum_step_height: 0.26
        mouth_same_surface_height_tolerance: 0.05
        mouth_minimum_patch_span: 0.20
        mouth_minimum_patch_minor_span: 0.10
        mouth_min_supported_component_points: 8
        # A single raised top is kept as an obstacle. Floor + at least two
        # successive tread heights is treated as a stair chain.
        mouth_minimum_stair_height_levels: 3

lego_loam_fa:
  ros__parameters:
    use_sim_time: false
    featureAssociation:
        edge_threshold: 0.1
        surf_threshold: 0.1
        nearest_feature_search_distance: 5.0
        # Require an odometry pose aligned to each XT16 frame. If the two
        # drivers use different clock epochs, measure the stable offset and
        # set odom_time_offset_sec explicitly; an unmatched frame is rejected.
        odom_sync_enabled: true
        odom_sync_tolerance_sec: 0.05
        odom_buffer_duration_sec: 5.0
        odom_interpolation_max_gap_sec: 0.05
        odom_sync_wait_timeout_sec: 0.1
        odom_time_offset_sec: 0.0

    mapping:
        to_map_optimization: true

lego_loam_mo:
  ros__parameters:
    use_sim_time: false

    mapping:
        # Preserve treads that are visible for less than the default 0.5 m.
        # This is spatial sampling resolution, independent of stair height.
        distance_between_key_frame: 0.15
        angle_between_key_frame: 0.5
        enable_loop_closure: false
        surrounding_keyframe_search_num: 50
        history_keyframe_search_radius: 12.0
        history_keyframe_search_num: 5
        history_keyframe_fitness_score: 0.5
        ground_voxel_size: 0.3
        broadcast_external_odom_tf: true
        # Eigen returns ascending eigenvalues with eigenvectors in columns.
        # The full 6DoF diagnostic still uses these thresholds; axis-split
        # mode solves its world-Z column conditionally instead of projecting it.
        degeneracy_eigenvalue_thresholds: [100.0, 100.0, 100.0, 100.0, 100.0, 100.0]
        # Keep the measured approximately 2 m stair rise from scan/ground geometry.
        # Odom/IMU supplies rotation and world X/Y, never world Z.
        axis_split_factor_enabled: true
        axis_split_scan_z_variance: 0.01
        axis_split_unobservable_z_variance: 1000000.0
        axis_split_scan_z_min_information: 10.0
        # Per LM iteration; diagnostics report whether any iteration was clamped.
        axis_split_scan_z_max_iteration_step: 0.15
        external_odom_factor_enabled: false
        external_odom_rotation_variance: 0.0025
        external_odom_translation_variance: 0.01
        # Mutually exclusive with the axis-split factor: this legacy prior
        # would pull Z back to the nearly planar external odometry trajectory.
        planar_constraint_enabled: false
        planar_roll_pitch_variance: 0.0025
        planar_z_variance: 0.01
        planar_unconstrained_variance: 1000000.0

lego_loam_map_visualization:
  ros__parameters:
    use_sim_time: false
    ground_voxel_size: 0.1
    ground_edge_threshold_num: 50

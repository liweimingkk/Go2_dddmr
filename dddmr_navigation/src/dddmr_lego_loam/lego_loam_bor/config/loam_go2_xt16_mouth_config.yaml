lego_loam_ip:
  ros__parameters:
    use_sim_time: false
    # Derived from loam_go2_xt16_live.yaml. Keep the XT16 scan parameters
    # matched to the active 32000-point, 10 Hz driver mode.
    laser:
        odom_type: "wheel_odometry"
        base_ground_frame: "base_link"
        num_vertical_scans: 16
        num_horizontal_scans: 2000
        vertical_angle_bottom: -15.0
        vertical_angle_top: 15.0
        scan_period: 0.1

    imageProjection:
        segment_valid_point_num: 5
        segment_valid_line_num: 3
        segment_theta: 60.0
        minimum_detection_range: 0.5
        maximum_detection_range: 100.0
        distance_for_patch_between_rings: 1.0
        stitcher_num: 0
        trt_model_path: ""
        projected_image_stack_size: 1
        ground_slope_tolerance: 0.3
        ground_dz_tolerance: 0.1
        patch_first_ring_to_baselink: true
        # Disable only for this live Go2 XT16 path because OMP voxel filtering
        # has shown live crash risk in this workspace. Other configs keep the
        # upstream-compatible default true.
        use_omp_ground_voxel_filter: false

        ground_fov_bottom: -0.2617994
        ground_fov_top: -0.087266
        ground_positive_start: 0.0
        ground_positive_stop: 3.1415926
        ground_negative_start: 0.0
        ground_negative_stop: -3.1415926

        enable_mouth_ground_fusion: true
        # Current validated Go2 topic. Raw /utlidar/cloud has frame
        # utlidar_lidar in this live graph and must not be treated as validated
        # until a correct utlidar_lidar TF is provided and checked.
        mouth_cloud_topic: "/utlidar/cloud_base"
        # /utlidar/cloud_base already publishes frame_id=base_link. Keep empty
        # by default so future frame mistakes are visible instead of masked.
        mouth_frame_override: ""
        # Temporary stationary-test filter frame. For walking mapping, prefer a
        # trusted base_footprint or roll/pitch-compensated ground frame and
        # retune mouth_ground_z_min/max around that frame's ground height.
        mouth_filter_frame: "base_link"
        # Keep this reusable YAML deterministic for bag/direct-handler replay.
        # The live mouth launch explicitly overrides it to receipt_time because
        # the sensor clock epoch can change after a link reconnect.
        mouth_sync_mode: "header_offset"
        # Clouds are not motion-compensated across timestamps. This is the
        # maximum pairing error and, in live receipt mode, the future wait cap.
        mouth_max_time_diff: 0.03
        # The live launch overrides the mode and ignores this header offset.
        mouth_time_offset_sec: 0.0
        # base_link-frame ground window for stationary Go2 standing height.
        # Tune in RViz before any motion; do not use as a final walking setup
        # without validating body roll/pitch effects.
        mouth_ground_z_min: -0.42
        mouth_ground_z_max: -0.18
        mouth_x_min: 0.05
        mouth_x_max: 3.0
        mouth_y_abs: 1.2
        mouth_range_min: 0.15
        mouth_range_max: 4.5
        mouth_voxel_size: 0.06
        mouth_buffer_size: 90
        mouth_min_points: 20

lego_loam_fa:
  ros__parameters:
    use_sim_time: false
    featureAssociation:
        edge_threshold: 0.1
        surf_threshold: 0.1
        nearest_feature_search_distance: 5.0
        # Require an odometry pose aligned to each XT16 frame. If the two
        # drivers use different clock epochs, measure the stable offset and
        # set odom_time_offset_sec explicitly; an unmatched frame is rejected.
        odom_sync_enabled: true
        odom_sync_tolerance_sec: 0.05
        odom_buffer_duration_sec: 5.0
        odom_interpolation_max_gap_sec: 0.05
        odom_sync_wait_timeout_sec: 0.1
        odom_time_offset_sec: 0.0

    mapping:
        to_map_optimization: true

lego_loam_mo:
  ros__parameters:
    use_sim_time: false

    mapping:
        distance_between_key_frame: 0.5
        angle_between_key_frame: 0.5
        enable_loop_closure: false
        surrounding_keyframe_search_num: 50
        history_keyframe_search_radius: 12.0
        history_keyframe_search_num: 5
        history_keyframe_fitness_score: 0.5
        ground_voxel_size: 0.3
        broadcast_external_odom_tf: true
        # Eigen returns ascending eigenvalues with eigenvectors in columns.
        # Weak scan-to-map eigendirections are projected out with V D V^T.
        degeneracy_eigenvalue_thresholds: [100.0, 100.0, 100.0, 100.0, 100.0, 100.0]
        # Anchor corridor-weak directions with the synchronized external odom.
        external_odom_factor_enabled: true
        external_odom_rotation_variance: 0.0025
        external_odom_translation_variance: 0.01
        # On the flat indoor route, use the odom/IMU estimate for roll, pitch
        # and z while leaving x, y and yaw effectively unconstrained here.
        planar_constraint_enabled: true
        planar_roll_pitch_variance: 0.0025
        planar_z_variance: 0.01
        planar_unconstrained_variance: 1000000.0

lego_loam_map_visualization:
  ros__parameters:
    use_sim_time: false
    ground_voxel_size: 0.3
    ground_edge_threshold_num: 50
